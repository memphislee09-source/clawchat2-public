name: Bug report
description: Report a reproducible bug in ClawChat2
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Before filing:

        - confirm this is for the ClawChat2 fork, not the official OpenClaw repository
        - remove private tokens, private hosts, and machine-specific paths
        - include concrete reproduction steps
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "Example: 0.2.1"
    validations:
      required: true
  - type: input
    id: android
    attributes:
      label: Android version
      placeholder: "Example: Android 11 / API 30"
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Where did you reproduce it?
      options:
        - Real device
        - Emulator
        - Both
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or recordings
      description: Paste relevant logs or attach screenshots. Redact anything private.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Privacy check
      options:
        - label: I removed private tokens, private hosts, and personal machine paths from this report.
          required: true
        - label: I understand this repository is an unofficial fork and not the official OpenClaw project.
          required: true
